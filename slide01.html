<!DOCTYPE html>

<body class="title-slide">

                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--spacing-md); margin-top: var(--spacing-lg);">
                        <div style="text-align: center; padding: var(--spacing-md); background: rgba(255,255,255,0.1); border-radius: 12px;">
                            <div style="font-size: 2rem; margin-bottom: var(--spacing-xs);">📧</div>
                            <div style="font-size: var(--font-size-sm); opacity: 0.8; margin-bottom: var(--spacing-xs);">Email</div>

                        </div>
                        <div style="text-align: center; padding: var(--spacing-md); background: rgba(255,255,255,0.1); border-radius: 12px;">
                            <div style="font-size: 2rem; margin-bottom: var(--spacing-xs);">🎓</div>
                            <div style="font-size: var(--font-size-sm); opacity: 0.8; margin-bottom: var(--spacing-xs);">学会</div>
                            <div style="font-size: var(--font-size-base); font-weight: 600;">ソフトウェアシンポジウム2026</div>
                        </div>
                        <div style="text-align: center; padding: var(--spacing-md); background: rgba(255,255,255,0.1); border-radius: 12px;">
                            <div style="font-size: 2rem; margin-bottom: var(--spacing-xs);">📅</div>
                            <div style="font-size: var(--font-size-sm); opacity: 0.8; margin-bottom: var(--spacing-xs);">日時</div>
                            <div style="font-size: var(--font-size-base); font-weight: 600;">2026年6月</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="content-grid animate-fade-in stagger-3" style="margin-top: var(--spacing-lg);">
                <div style="text-align: center; padding: var(--spacing-lg); background: rgba(255,255,255,0.1); border-radius: 16px; color: white;">
                    <h3 style="font-size: var(--font-size-xl); font-weight: 600; margin-bottom: var(--spacing-sm); color: white;">🎯 発表のハイライト</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: var(--spacing-md); margin-top: var(--spacing-md);">
                        <div style="text-align: center;">
                            <div style="font-size: 2.5rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; margin-bottom: var(--spacing-xs); color: var(--accent-orange);">5.8×</div>
                            <div style="font-size: var(--font-size-sm); opacity: 0.9;">生産性向上</div>
                        </div>
                        <div style="text-align: center;">

                        </div>

            </div>
        </div>
    </div>

    <!-- Navigation Footer -->
    <nav class="nav-footer">
        <button class="nav-button disabled" id="prevBtn" disabled onclick="navigatePrev()">⬅️ 前へ</button>
        <a href="index.html" class="nav-button secondary">📋 目次</a>
        <button class="nav-button" id="nextBtn" onclick="navigateNext()">次へ ➡️</button>
    </nav>

    <!-- Include Navigation JavaScript -->
    <script src="assets/navigation.js"></script>
    
    <script>
        // Slide-specific JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            // Custom animations for title slide
            setTimeout(() => {
                const highlights = document.querySelectorAll('[style*="font-family: \'JetBrains Mono\'"]');
                highlights.forEach((el, index) => {
                    setTimeout(() => {
                        el.style.animation = 'pulse 2s infinite';
                    }, index * 500);
                });
            }, 2000);
            
            // Add special keyboard shortcuts for title slide
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    window.navigation.nextSlide();
                }
            });
            
            console.log('📄 Title Slide (1/25) Loaded');
        });
    </script>
